<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="stellar-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background rounded square -->
  <rect x="40" y="40" width="432" height="432" rx="100" fill="url(#stellar-gradient)" />
  
  <!-- Letter S -->
  <path 
    d="M 256 140 
       C 180 140 140 180 140 220 
       C 140 260 180 280 256 280 
       C 332 280 372 300 372 340 
       C 372 380 332 420 256 420 
       C 180 420 140 380 140 340"
    fill="none" 
    stroke="white" 
    stroke-width="45" 
    stroke-linecap="round"
  />
  
  <!-- Sparkles -->
  <circle cx="380" cy="150" r="12" fill="white" opacity="0.8" />
  <circle cx="120" cy="380" r="8" fill="white" opacity="0.6" />
  <circle cx="400" cy="280" r="6" fill="white" opacity="0.5" />
  <circle cx="100" cy="200" r="5" fill="white" opacity="0.4" />
</svg>
